# P6 COMPLETE: Pytest Configuration for 100+ Tests

[tool.pytest.ini_options]
# Test discovery
testpaths = [
    "quran/corpus_extraction",
    "tests/corpus-extraction",
]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*", "*Test"]
python_functions = ["test_*"]

# Test markers
markers = [
    "unit: Unit tests (fast, isolated)",
    "integration: Integration tests (multiple modules)",
    "slow: Slow tests (>1 second)",
    "api: Tests requiring API access",
    "p1: P1 Source Reconstruction tests",
    "p2: P2 New Domains tests",
    "p3: P3 Confidence tests",
    "p4: P4 Overclaim tests",
    "p5: P5 Tafsir tests",
    "p6: P6 Test Infrastructure tests",
]

# Execution settings
addopts = """
    -v
    --tb=short
    --strict-markers
    -ra
    --color=yes
    --durations=10
"""

# Timeout settings (prevent hanging tests)
timeout = 300  # 5 minutes per test
timeout_func_only = false

# Coverage settings
[tool.coverage.run]
source = ["quran/corpus_extraction"]
branch = true
omit = [
    "*/tests/*",
    "*/__pycache__/*",
    "*/test_*.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]
show_missing = true
precision = 2

[tool.coverage.html]
directory = "coverage_html_report"

# Parallel execution settings (pytest-xdist)
[tool.pytest-xdist]
# Auto-detect CPU count for parallel execution
numprocesses = "auto"

# Load balancing for even distribution
loadscope = true
