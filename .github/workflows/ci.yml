name: FrontierQu CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy scipy networkx pyyaml
          pip install pytest pytest-cov pytest-timeout ruff

      - name: Install package
        run: pip install -e . --no-deps

      - name: Lint with Ruff
        run: ruff check frontier_models frontier_neuro_symbolic --ignore E501,F401
        continue-on-error: true

      - name: Run core tests
        run: |
          pytest tests/test_advanced_solvers.py tests/test_frontier_models.py tests/test_integrations.py \
            -v --tb=short --timeout=60 \
            --cov=frontier_models --cov=frontier_neuro_symbolic \
            --cov-report=xml --cov-report=term-missing

      - name: Run frontier models auto-discovery tests
        run: |
          pytest tests/test_all_frontier_models.py -v --tb=short --timeout=120 -q
        continue-on-error: false

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
