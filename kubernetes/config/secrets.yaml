apiVersion: v1
kind: Secret
metadata:
  name: quran-secrets
  namespace: quran-system
type: Opaque
stringData:
  # Database Credentials
  DB_USER: "quran_user"
  DB_PASSWORD: "change-me-to-strong-password-in-production"
  POSTGRES_PASSWORD: "change-me-to-strong-password-in-production"

  # Neo4j Credentials
  NEO4J_USER: "neo4j"
  NEO4J_PASSWORD: "change-me-to-strong-neo4j-password-in-production"

  # API Keys (update with real values)
  API_SECRET_KEY: "change-me-to-real-secret-key-min-32-chars-prod"
  JWT_SECRET: "change-me-to-real-jwt-secret-min-32-chars-prod"

  # Third-party Service Keys (optional)
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry
  namespace: quran-system
type: kubernetes.io/dockercfg
data:
  .dockercfg: eyJhdXRocyI6e319  # Base64 encoded empty docker config

---
