apiVersion: v1
kind: ConfigMap
metadata:
  name: quran-config
  namespace: quran-system
data:
  # API Configuration
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_LOG_LEVEL: "info"

  # Frontend Configuration
  FRONTEND_HOST: "0.0.0.0"
  FRONTEND_PORT: "3000"
  NEXT_PUBLIC_API_URL: "http://api-service.quran-system.svc.cluster.local:8000"

  # Database Configuration
  DB_HOST: "postgres-0.postgres-service.quran-system.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "quran_db"
  DB_POOL_SIZE: "20"
  DB_MAX_OVERFLOW: "10"

  # Neo4j Configuration
  NEO4J_HOST: "neo4j-0.neo4j-service.quran-system.svc.cluster.local"
  NEO4J_PORT: "7687"
  NEO4J_SCHEME: "bolt"

  # Redis Configuration
  REDIS_HOST: "redis-0.redis-service.quran-system.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_MAX_CONNECTIONS: "50"

  # Milvus Configuration
  MILVUS_HOST: "milvus-0.milvus-service.quran-system.svc.cluster.local"
  MILVUS_PORT: "19530"

  # Application Configuration
  ENVIRONMENT: "production"
  LOG_FORMAT: "json"
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  NODE_ENV: "production"

  # Monitoring
  PROMETHEUS_ENABLED: "true"
  METRICS_PORT: "8001"
  ENABLE_HEALTH_CHECKS: "true"
  HEALTH_CHECK_INTERVAL: "30s"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-config
  namespace: quran-system
data:
  init.sql: |
    -- Create extensions
    CREATE EXTENSION IF NOT EXISTS pg_trgm;
    CREATE EXTENSION IF NOT EXISTS btree_gin;

    -- Create main tables (schema will be initialized by application)
    CREATE TABLE IF NOT EXISTS verses (
      id SERIAL PRIMARY KEY,
      surah INT NOT NULL,
      ayah INT NOT NULL,
      text_ar TEXT NOT NULL,
      text_en TEXT,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      UNIQUE(surah, ayah)
    );

    CREATE INDEX IF NOT EXISTS idx_verses_surah ON verses(surah);
    CREATE INDEX IF NOT EXISTS idx_verses_ayah ON verses(ayah);
    CREATE INDEX IF NOT EXISTS idx_verses_text_ar ON verses USING gin (text_ar gin_trgm_ops);

    -- Create users table for governance
    CREATE TABLE IF NOT EXISTS users (
      id SERIAL PRIMARY KEY,
      username VARCHAR(255) UNIQUE NOT NULL,
      email VARCHAR(255) UNIQUE NOT NULL,
      role VARCHAR(50) NOT NULL,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE INDEX IF NOT EXISTS idx_users_role ON users(role);

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: quran-system
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
      worker_connections 1024;
      use epoll;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;

      log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

      access_log /var/log/nginx/access.log main;

      sendfile on;
      tcp_nopush on;
      tcp_nodelay on;
      keepalive_timeout 65;
      types_hash_max_size 2048;
      client_max_body_size 100m;

      gzip on;
      gzip_vary on;
      gzip_proxied any;
      gzip_comp_level 6;
      gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

      # Rate limiting
      limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
      limit_req_zone $binary_remote_addr zone=frontend_limit:10m rate=50r/s;

      upstream api_backend {
        least_conn;
        server api-service.quran-system.svc.cluster.local:8000 weight=5 max_fails=3 fail_timeout=30s;
        keepalive 32;
      }

      upstream frontend_backend {
        least_conn;
        server frontend-service.quran-system.svc.cluster.local:3000 weight=5 max_fails=3 fail_timeout=30s;
        keepalive 32;
      }

      server {
        listen 80;
        server_name api.quran.local;

        location / {
          limit_req zone=api_limit burst=20 nodelay;
          proxy_pass http://api_backend;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          proxy_buffering off;
        }
      }

      server {
        listen 80;
        server_name app.quran.local;

        location / {
          limit_req zone=frontend_limit burst=10 nodelay;
          proxy_pass http://frontend_backend;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
        }
      }

      server {
        listen 80 default_server;
        return 404;
      }
    }
