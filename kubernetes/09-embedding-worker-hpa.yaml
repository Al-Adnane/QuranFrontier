apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: embedding-worker-hpa
  namespace: quran-system
  labels:
    app: embedding-worker
    phase: phase-3
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 2
  maxReplicas: 6
  metrics:
  # CPU-based scaling (70% threshold)
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  # Custom metric: Queue depth from Redis
  - type: Pods
    pods:
      metric:
        name: embedding_queue_depth
      target:
        type: AverageValue
        averageValue: "500"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      # Scale up by 100% (double replicas) every 15 seconds
      - type: Percent
        value: 100
        periodSeconds: 15
      # Or scale up by 2 pods max per 15 seconds
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      # Scale down by 50% every 15 seconds
      - type: Percent
        value: 50
        periodSeconds: 15
      # Or scale down by 1 pod per 15 seconds
      - type: Pods
        value: 1
        periodSeconds: 15
      selectPolicy: Min

---
apiVersion: v1
kind: Service
metadata:
  name: embedding-worker-service
  namespace: quran-system
  labels:
    app: embedding-worker
spec:
  type: ClusterIP
  selector:
    app: worker
  ports:
  - port: 5555
    targetPort: 5555
    protocol: TCP
    name: flower
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: metrics

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: embedding-worker-pdb
  namespace: quran-system
  labels:
    app: embedding-worker
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: worker
