apiVersion: v1
kind: Service
metadata:
  name: neo4j-service
  namespace: quran-system
  labels:
    app: neo4j
spec:
  clusterIP: None
  selector:
    app: neo4j
  ports:
  - port: 7687
    targetPort: 7687
    name: bolt
  - port: 7474
    targetPort: 7474
    name: http

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: quran-system
  labels:
    app: neo4j
spec:
  serviceName: neo4j-service
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      securityContext:
        fsGroup: 7474
        runAsUser: 7474
        runAsNonRoot: true

      containers:
      - name: neo4j
        image: neo4j:5.15-community
        imagePullPolicy: IfNotPresent
        ports:
        - name: bolt
          containerPort: 7687
          protocol: TCP
        - name: http
          containerPort: 7474
          protocol: TCP

        env:
        - name: NEO4J_AUTH
          value: "neo4j/$(NEO4J_PASSWORD)"
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: quran-secrets
              key: NEO4J_PASSWORD
        - name: NEO4J_server_memory_heap_initial_size
          value: "256m"
        - name: NEO4J_server_memory_heap_max_size
          value: "512m"
        - name: NEO4J_ACCEPT_LICENSE_AGREEMENT
          value: "yes"
        - name: NEO4J_apoc_import_file_enabled
          value: "true"
        - name: NEO4J_apoc_export_file_enabled
          value: "true"

        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2
            memory: 1Gi

        livenessProbe:
          tcpSocket:
            port: bolt
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          exec:
            command:
            - /bin/bash
            - -c
            - "curl -f http://localhost:7474 || exit 1"
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        volumeMounts:
        - name: neo4j-storage
          mountPath: /var/lib/neo4j/data
        - name: neo4j-logs
          mountPath: /var/lib/neo4j/logs

  volumeClaimTemplates:
  - metadata:
      name: neo4j-storage
      labels:
        app: neo4j
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: standard
      resources:
        requests:
          storage: 50Gi
  - metadata:
      name: neo4j-logs
      labels:
        app: neo4j
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: standard
      resources:
        requests:
          storage: 10Gi
