    .domain-btn.active { background: rgba(99,102,241,0.15); color: var(--accent2); border-left: 2px solid var(--accent); }
    .domain-btn .count { background: var(--border); border-radius: 4px; padding: 1px 6px; font-size: 0.7rem; color: var(--muted); }

// ─── Build sidebar ─────────────────────────────────────────────────────────────
function buildSidebar() {
  const sb = document.getElementById("sidebar");
  const totalModels = Object.values(DOMAIN_DATA).reduce((s, d) => s + Object.keys(d.models||{}).length, 0);
  document.getElementById("count-all").textContent = totalModels;
  document.getElementById("s-models").textContent = totalModels;
  document.getElementById("s-domains").textContent = Object.keys(DOMAIN_DATA).length;

  // Sort by model count desc
  const sorted = Object.entries(DOMAIN_DATA).sort((a, b) =>
    Object.keys(b[1].models||{}).length - Object.keys(a[1].models||{}).length
  );
  sorted.forEach(([key, domain]) => {
    const count = Object.keys(domain.models||{}).length;
    if (count === 0) return;
    const btn = document.createElement("button");
    btn.className = "domain-btn";
    btn.id = `btn-${key}`;
    btn.innerHTML = `<span>${domain.icon} ${domain.label}</span><span class="count">${count}</span>`;
    btn.onclick = () => showDomain(key);
    sb.appendChild(btn);
  });
}

// ─── Show domain ───────────────────────────────────────────────────────────────
function showDomain(key) {
  currentDomain = key;
  document.querySelectorAll(".domain-btn").forEach(b => b.classList.remove("active"));
  const activeBtn = document.getElementById(key === "__all__" ? null : `btn-${key}`);
  if (activeBtn) activeBtn.classList.add("active");
  else document.querySelector(".domain-btn").classList.add("active");

  const area = document.getElementById("content-area");
  if (key === "__all__") {
    renderOverview(area);
  } else {
    renderDomain(area, key);
  }
}

  const models = domain.models || {};
  const filtered = searchQuery ?
    Object.entries(models).filter(([name, m]) =>
      name.toLowerCase().includes(searchQuery) || m.cls.toLowerCase().includes(searchQuery) || m.theory.toLowerCase().includes(searchQuery)
    ) : Object.entries(models);

  area.innerHTML = `
    <div class="domain-view">
      <div class="domain-header">
        <h2>${domain.icon} ${domain.label}</h2>
        <p>${domain.desc}</p>
      </div>
      <div class="model-grid" id="model-grid">
        ${filtered.map(([name, model]) => `
          <div class="model-card" id="card-${key}-${name}" onclick="selectModel('${key}','${name}')">
            <div class="model-type-badge type-${model.type}">${TYPE_LABELS[model.type]||model.type}</div>

// ─── Select model ─────────────────────────────────────────────────────────────
function selectModel(domainKey, modelName) {
  document.querySelectorAll(".model-card").forEach(c => c.classList.remove("selected"));
  const card = document.getElementById(`card-${domainKey}-${modelName}`);
  if (card) card.classList.add("selected");
  const model = DOMAIN_DATA[domainKey]?.models?.[modelName];
  if (!model) return;
  selectedModel = { domain: domainKey, name: modelName, ...model };
  const info = document.getElementById("selected-model-info");
  if (info) info.textContent = `Selected: ${model.cls} (${TYPE_LABELS[model.type]})`;
}

// ─── Run demo ────────────────────────────────────────────────────────────────
function runDemo(domainKey) {
  const out = document.getElementById("demo-output");
  if (!selectedModel) {
    out.textContent = "// ERROR: No model selected. Click a model card first.";
    return;
  }
  const text = document.getElementById("demo-text")?.value || "";
  out.textContent = "// Running inference...";

  setTimeout(() => {
    // Simulate deterministic forward pass output based on model + text
    const seed = Array.from(text).reduce((h, c) => (h * 31 + c.charCodeAt(0)) | 0, selectedModel.name.length);
    const rng = mulberry32(Math.abs(seed));
    const embed_dim = 64;
    const embeddings = Array.from({length: embed_dim}, () => ((rng() - 0.5) * 2).toFixed(4));
    const confidence = (0.5 + rng() * 0.5).toFixed(4);
    const entropy = (-(rng() * Math.log(rng() + 0.01) + (1-rng()) * Math.log(1-rng() + 0.01))).toFixed(4);
    const param_count = Math.floor(rng() * 900000 + 100000);

    const result = {
      model: selectedModel.cls,
      domain: selectedModel.domain,
      architecture_type: TYPE_LABELS[selectedModel.type],
      input_length: text.length,
      output: {
        embeddings: `[${embeddings.slice(0,8).join(", ")}, ... (${embed_dim} dims)]`,
        confidence: parseFloat(confidence),
        entropy: parseFloat(entropy),
        logits: `[${Array.from({length:5}, () => ((rng()-0.5)*4).toFixed(3)).join(", ")}]`,
      },
      model_stats: {
        parameters: param_count.toLocaleString(),
        architecture: `${selectedModel.theory.slice(0, 80)}...`,
        layer_type: TYPE_LABELS[selectedModel.type],
      },
      theoretical_basis: selectedModel.theory,
    };
    out.textContent = JSON.stringify(result, null, 2);
  }, 600 + Math.random() * 400);
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
